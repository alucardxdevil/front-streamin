<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/logo-pest.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="google" content="notranslate" />

    <!-- Detectar idioma del navegador y aplicar al atributo lang del HTML -->
    <script>
      (function() {
        var supported = ['es','en','pt','de','ru','zh','fr','hi','ar'];
        var langs = navigator.languages || [navigator.language || 'en'];
        var detected = 'en';
        for (var i = 0; i < langs.length; i++) {
          var base = langs[i].split('-')[0].toLowerCase();
          if (supported.indexOf(base) !== -1) { detected = base; break; }
        }
        var manual = localStorage.getItem('languageManuallySet');
        if (manual === 'true') {
          var saved = localStorage.getItem('language');
          if (saved && supported.indexOf(saved) !== -1) detected = saved;
        }
        document.documentElement.lang = detected;
      })();
    </script>

    <!-- SEO: Meta tags base (react-helmet-async los sobreescribe dinámicamente) -->
    <title>stream-in — Share and discover videos</title>
    <meta
      name="description"
      content="stream-in is the platform for uploading, sharing, and discovering videos from independent creators. Explore trends, follow your favorite creators, and enjoy high-quality content."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://stream-in.com" />

    <!-- Open Graph (fallback estático para crawlers que no ejecutan JS) -->
    <meta property="og:site_name" content="stream-in" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="stream-in — Share and discover videos" />
    <meta
      property="og:description"
      content="stream-in is the platform for uploading, sharing, and discovering videos from independent creators. Explore trends, follow your favorite creators, and enjoy high-quality content."
    />
    <meta property="og:image" content="https://stream-in.com/logo-pest.png" />
    <meta property="og:url" content="https://stream-in.com" />
    <meta property="og:locale" content="es_MX" />

    <!-- Twitter Cards (fallback estático) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@streamin" />
    <meta name="twitter:title" content="stream-in — Share and discover videos" />
    <meta
      name="twitter:description"
      content="stream-in is the platform for uploading, sharing, and discovering videos from independent creators. Explore trends, follow your favorite creators, and enjoy high-quality content."
    />
    <meta name="twitter:image" content="https://stream-in.com/logo-pest.png" />

    <!-- Fuentes -->
    <!-- Cargamos Roboto sin bloquear el render: el navegador descarga la hoja
         con media="print" (baja prioridad, no bloquea) y al terminar la
         promovemos a media="all" con onload. <noscript> garantiza la fuente
         sin JS. Ahorra ~200–400 ms de FCP en cold visit. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap"
      />
    </noscript>
    <style>
      /* Sólo aplicamos la fuente a elementos visibles + reset de margen global.
         Mantener `font-family` en `*` obliga a recalcular estilos en cada nodo
         (incluye scripts/meta), así que lo limitamos a html/body y heredamos. */
      * {
        margin: 0;
      }
      html,
      body {
        font-family: "Roboto", sans-serif;
      }
    </style>
  </head>
  <body>
    <noscript>stream-in is the platform for uploading, sharing, and discovering videos from independent creators. Explore trends,
    follow your favorite creators, and enjoy high-quality content.</noscript>
    <div id="root"></div>

    <!-- App: el módulo principal arranca primero (es lo que pinta la UI). -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- Google Adsense: cargado al final del body y con defer para que NO
         compita con el render inicial de la app. AdSense no es crítico para
         el FCP, así que lo bajamos de prioridad. -->
    <script
      defer
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7445263311603329"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
