<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/logo-pest.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="google" content="notranslate" />

    <!-- Detectar idioma del navegador y aplicar al atributo lang del HTML -->
    <script>
      (function() {
        var supported = ['es','en','pt','de','ru','zh','fr','hi','ar'];
        var langs = navigator.languages || [navigator.language || 'en'];
        var detected = 'en';
        for (var i = 0; i < langs.length; i++) {
          var base = langs[i].split('-')[0].toLowerCase();
          if (supported.indexOf(base) !== -1) { detected = base; break; }
        }
        // Respetar elección manual del usuario
        var manual = localStorage.getItem('languageManuallySet');
        if (manual === 'true') {
          var saved = localStorage.getItem('language');
          if (saved && supported.indexOf(saved) !== -1) detected = saved;
        }
        document.documentElement.lang = detected;
      })();
    </script>

    <!-- SEO: Meta tags base (react-helmet-async los sobreescribe dinámicamente) -->
    <title>stream-in — Share and discover videos</title>
    <meta
      name="description"
      content="stream-in is the platform for uploading, sharing, and discovering videos from independent creators. Explore trends, follow your favorite creators, and enjoy high-quality content."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://stream-in.com" />

    <!-- Open Graph (fallback estático para crawlers que no ejecutan JS) -->
    <meta property="og:site_name" content="stream-in" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="stream-in — Share and discover videos" />
    <meta
      property="og:description"
      content="stream-in is the platform for uploading, sharing, and discovering videos from independent creators. Explore trends, follow your favorite creators, and enjoy high-quality content."
    />
    <meta property="og:image" content="%PUBLIC_URL%/logo-pest.png" />
    <meta property="og:url" content="https://stream-in.com" />
    <meta property="og:locale" content="es_MX" />

    <!-- Twitter Cards (fallback estático) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@streamin" />
    <meta name="twitter:title" content="stream-in — Share and discover videos" />
    <meta
      name="twitter:description"
      content="stream-in is the platform for uploading, sharing, and discovering videos from independent creators. Explore trends, follow your favorite creators, and enjoy high-quality content."
    />
    <meta name="twitter:image" content="%PUBLIC_URL%/logo-pest.png" />

    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Roboto", sans-serif;
        margin: 0;
      }
    </style>
  </head>

</html>
